<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="estilos/style.css">
    <link rel="stylesheet" href="estilos/tablet.css">
    <link rel="stylesheet" href="estilos/desktop.css">
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@24,400,0,0" />
    <title>Login</title>
</head>
<body>
    <main>
        <section id="login">
            <div id="dimg">
                <div id="img"></div>
            </div>
            
            <div id="form">
                <h1>Login</h1>
                <p>Seja bem-vindo(a) novamente. Faça login para acessar sua conta e poder fazer as configurações no seu ambiente.</p>
                <form action="" method="post" autocomplete="on">
                    <div class="campo">
                        <span id="span" class="material-symbols-outlined">person</span>
                        <input type="email" name="email" id="iemail" required autocomplete="email" placeholder="Digite seu E-mail">
                    </div>
                    <div class="campo">
                        <span id="span" class="material-symbols-outlined">key</span>
                        <input type="password" name="sen" id="isen" required autocomplete="current-password" minlength="8" maxlength="20" placeholder="Digite sua Senha">
                    </div>
                    <input type="submit" value="Entrar">
                    <div id="mail">
                        
                        <a href="#">Esqueci a senha <span id="size" class="material-symbols-outlined">mail</span></a>
                    </div>
                </form>
            </div>
        </section>
    </main>
</body>
</html>
